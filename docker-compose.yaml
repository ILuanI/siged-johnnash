version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    expose:
      - "80"
    environment:
      APP_NAME: "SIGED"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "base64:vZi6fPR+/CIFZljCVvIVDiD2aK9c47XMVonHIbW75So="
      APP_URL: "${COOLIFY_URL}"
      LOG_CHANNEL: stack
      LOG_LEVEL: error
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: bd_johnnash
      DB_USERNAME: siged_user
      DB_PASSWORD: "SigedPassword2026!"
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      RUN_MIGRATIONS: "true"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: always
    expose:
      - "3306"
    environment:
      MYSQL_DATABASE: bd_johnnash
      MYSQL_USER: siged_user
      MYSQL_PASSWORD: "SigedPassword2026!"
      MYSQL_ROOT_PASSWORD: "SigedRootPassword2026!"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pSigedRootPassword2026!"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
